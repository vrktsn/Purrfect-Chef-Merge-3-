<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Purrfect Chef</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel to compile JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overscroll-behavior: none; /* Prevent pull-to-refresh on mobile */
        }
        /* Custom scrollbar hiding */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Animations */
        @keyframes pop-in { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop-in { animation: pop-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        
        @keyframes shrink-out { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(0); opacity: 0; } }
        .animate-shrink-out { animation: shrink-out 0.5s ease-in forwards; }
        
        @keyframes merge-pulse { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.2); filter: brightness(1.3); } 100% { transform: scale(1); filter: brightness(1); } }
        .animate-merge-pulse { animation: merge-pulse 0.5s ease-in-out; }
        
        @keyframes hint-breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        .animate-hint-breathe { animation: hint-breathe 2s ease-in-out infinite; }
        
        @keyframes dish-breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .animate-dish-breathe { animation: dish-breathe 3s ease-in-out infinite; }
        
        @keyframes float-up { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 20% { transform: translateY(-20px) scale(1.1); opacity: 1; } 100% { transform: translateY(-100px) scale(1); opacity: 0; } }
        .animate-float-up { animation: float-up 2s ease-out forwards; }
        
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fade-in 0.3s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;

        // --- Custom Icons (Replacing Lucide Imports for Standalone HTML) ---

        const ITEMS = {

            category: 'ingredient',
            styleClass: `${BASE_BLOCK_STYLE} bg-gradient-to-b from-green-300 to-green-500 shadow-green-700`,
            tint: 'bg-green-600',
            tiers: [
              { name: 'Fresh Lettuce', assetId: 'lettuce_1' },
              { name: 'Chopped Salad', assetId: 'lettuce_2' }, 
              { name: 'Caesar Salad', assetId: 'lettuce_3', isDish: true }

          },
          chicken: {
            category: 'ingredient',
            styleClass: `${BASE_BLOCK_STYLE} bg-gradient-to-b from-orange-300 to-orange-500 shadow-orange-700`,
            tint: 'bg-orange-600',
            tiers: [
              { name: 'Drumstick', assetId: 'chicken_1' },
              { name: 'Grilled Chicken', assetId: 'chicken_2' },
              { name: 'Roast Platter', assetId: 'chicken_3', isDish: true }

          },
          tomato: {
            category: 'ingredient',
            styleClass: `${BASE_BLOCK_STYLE} bg-gradient-to-b from-red-300 to-red-500 shadow-red-800`,
            tint: 'bg-red-600',

              { name: 'Tomato', assetId: 'tomato_1' },

          fire: {

            effect: 'water_buff'

            effect: 'zap_buff'

          let sum = 0;
          const r = Math.random() * 100;
          for (const key of ITEM_KEYS) {

            sum += weight;
            if (r <= sum) return key;

          return 'lettuce';

              if (LEVEL_LAYOUT[r][c] === 1) {
                let newItem;
                let isMatch;
                let attempts = 0;
                
                do {
                    newItem = createNewItem();
                    isMatch = false;
                    if (c >= 2) {

                        const l2 = row[c-2];

                <div className="absolute -top-3 -right-3">

                <h3 className="text-2xl font-black text-gray-800 mb-4 text-center tracking-tight shrink-0">Ingredients Guide 📖</h3>
                
                <div className="overflow-y-auto pr-2 space-y-6 flex-1">

          useEffect(() => {

          if (activeBuffs.length === 0) return null;

          // Force collapse if more than 2 buffs are active to save space

          return (
            <div className="flex flex-row gap-2 pointer-events-auto items-center justify-center max-w-[50vw] flex-wrap">
              {activeBuffs.map((buffType) => {
                 const config = ITEMS[buffType];
                 if (!config) return null;
                 
                 const bgColors = {
                     fire: 'bg-rose-100 border-rose-300 text-rose-800',
                     water: 'bg-blue-100 border-blue-300 text-blue-800',
                     electricity: 'bg-yellow-100 border-yellow-300 text-yellow-800',
                     cash: 'bg-emerald-100 border-emerald-300 text-emerald-800'

                 const colors = bgColors[buffType] || 'bg-gray-100 border-gray-200 text-gray-700';

                 return (expanded && !forceShort) ? (
                    <div key={buffType} className={`flex items-center gap-2 ${colors} border-2 px-3 py-1.5 rounded-xl shadow-xl animate-pop-in relative min-w-[150px] z-[110]`}>
                       <div className="w-8 h-8 shrink-0 drop-shadow-md">

                       <div className="flex flex-col leading-tight min-w-0 flex-1">

        const FloatingFX = ({ fx }) => {
          return (
            <div 
              className="absolute pointer-events-none z-[60] flex flex-col items-center animate-float-up transform -translate-x-1/2 -translate-y-1/2 whitespace-nowrap"
              style={{ left: `${Math.max(15, Math.min(85, fx.x))}%`, top: `${fx.y}%` }}
            >
              {fx.icon && <div className="text-5xl filter drop-shadow-lg mb-1">{fx.icon}</div>}
              {fx.text && (
                <span className="text-2xl font-black text-white px-4 py-1 bg-gradient-to-r from-pink-500 to-purple-500 rounded-full border-4 border-white shadow-2xl transform -rotate-6">
                  {fx.text}
                </span>
              )}

          );

        const Tile = ({ item, isSelected, onPointerDown, row, col, isHint }) => {
          const [styles, setStyles] = useState({});

          useEffect(() => {
            if (!item) return;
            if (item.prevR !== undefined && item.prevR !== row) {
                const diff = row - item.prevR;
                if (diff > 0) {
                    setStyles({ transform: `translateY(-${diff * 110}%)`, transition: 'none', zIndex: 10 });
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            setStyles({ transform: 'translateY(0)', transition: 'transform 600ms cubic-bezier(0.34, 1.56, 0.64, 1)', zIndex: 10 });
                        });
                    });
                }
            } else {
                setStyles({});
            }
          }, [item, row]); 

          if (!item) return <div className="w-full h-full" />; 

          const config = ITEMS[item.type];
          if (!config) return null; 

          let assetId;
          let styleClass = config.styleClass;
          let tintClass = config.tint || '';

          if (config.category === 'ingredient') {
            const tierConfig = config.tiers[item.tier];
            assetId = tierConfig ? tierConfig.assetId : null;
            
            if (item.tier === 1) styleClass += " contrast-125"; 
            if (item.tier === 2) {

              <div className="w-[85%] h-[85%] transform transition-transform group-active:scale-95 z-10">
                <AssetIcon type={assetId} className="w-full h-full" />
              </div>

              {tintClass && (
                <div className={`absolute inset-0 ${tintClass} mix-blend-overlay opacity-30 pointer-events-none rounded-inherit z-20`} />
              )}
              
              <div className="absolute top-2 right-2 w-3 h-1.5 bg-white/70 rounded-full blur-[1px] transform -rotate-12 z-30 pointer-events-none"></div>
              
              {item.tier === 2 && (
                <div className="absolute inset-0 flex items-center justify-center z-0">
                    <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-40"></span>

        function GameBoard() {
          const [board, setBoard] = useState([]);
          const [isProcessing, setIsProcessing] = useState(false);
          
          const [dishesServed, setDishesServed] = useState([]); 
          const [score, setScore] = useState(0);
          const [moves, setMoves] = useState(MAX_MOVES);
          const [gameState, setGameState] = useState('welcome'); 
          const [showHowTo, setShowHowTo] = useState(false);
          const [showIngredients, setShowIngredients] = useState(false);
          const [guideMessage, setGuideMessage] = useState(null);

          const [hint, setHint] = useState(null); 
          const [activeFX, setActiveFX] = useState([]); 
          
          const [logs, setLogs] = useState([]);
          const [showDebug, setShowDebug] = useState(false);
          const logCounter = useRef(1);
          const addLog = (msg, type = 'info') => setLogs(prev => [...prev, { id: logCounter.current++, msg, type }]);

          const [fireBuff, setFireBuff] = useState(false); 
          const [waterBuff, setWaterBuff] = useState(false); 
          const [electricityBuff, setElectricityBuff] = useState(false);
          const [multiplier, setMultiplier] = useState({ val: 1, charges: 0 });

          const [selected, setSelected] = useState(null);
          const dragStartRef = useRef(null);
          const hintTimeoutRef = useRef(null);
          const fxCounter = useRef(0);

          const createNewItem = (type = null) => {
            const itemType = type || getWeightedRandomItem();
            const config = ITEMS[itemType];
            return {
              id: Math.random().toString(36).substr(2, 9),
              type: itemType,
              category: config.category,
              tier: 0, 
              isNew: true,
              isMatch: false,
              isMerging: false,
            };
          };

          const createInitialBoard = () => {
            const newBoard = [];
            for (let r = 0; r < GRID_SIZE; r++) {
              const row = [];
              for (let c = 0; c < GRID_SIZE; c++) {
                if (LEVEL_LAYOUT[r][c] === 1) {
                  let newItem;
                  let isMatch;
                  let attempts = 0;
                  
                  do {
                      newItem = createNewItem();
                      isMatch = false;
                      if (c >= 2) {
                          const l1 = row[c-1];
                          const l2 = row[c-2];
                          if (l1 && l2 && l1.type === newItem.type && l2.type === newItem.type) isMatch = true;
                      }
                      if (!isMatch && r >= 2) {
                          const t1 = newBoard[r-1][c];
                          const t2 = newBoard[r-2][c];
                          if (t1 && t2 && t1.type === newItem.type && t2.type === newItem.type) isMatch = true;
                      }
                      attempts++;
                  } while (isMatch && attempts < 50);
                  
                  row.push(newItem);
                } else {
                  row.push(null);
                }
              }
              newBoard.push(row);
            }
            return newBoard;
          };

          useEffect(() => {
            setBoard(createInitialBoard());
          }, []);

          const triggerFX = (r, c, text, icon = null) => {
            const id = fxCounter.current++;
            const y = (r / GRID_SIZE) * 100 + 5; 
            const x = (c / GRID_SIZE) * 100 + 5;
            
            setActiveFX(prev => [...prev, { id, x, y, text, icon }]);
            setTimeout(() => {
               setActiveFX(prev => prev.filter(fx => fx.id !== id));
            }, 1500);
          };

          const checkForMatches = useCallback((currentBoard) => {
            let matches = [];
            const isDish = (item) => item && item.category === 'ingredient' && item.tier === 2;
            
            for (let r = 0; r < GRID_SIZE; r++) {
              let matchBuffer = [];
              for (let c = 0; c < GRID_SIZE; c++) {
                 const item = currentBoard[r][c];
                 const prev = matchBuffer.length > 0 ? matchBuffer[matchBuffer.length-1].item : null;
                 const isSame = prev && item && prev.type === item.type && (prev.category === 'ingredient' ? prev.tier === item.tier : true);
                 
                 if (isSame) matchBuffer.push({r, c, item});
                 else {
                    if (matchBuffer.length >= 3) matches.push(...matchBuffer.map(b => ({r: b.r, c: b.c})));
                    else if (matchBuffer.length >= 2 && isDish(matchBuffer[0].item)) matches.push(...matchBuffer.map(b => ({r: b.r, c: b.c})));
                    matchBuffer = item ? [{r, c, item}] : [];
                 }
              }
              if (matchBuffer.length >= 3) matches.push(...matchBuffer.map(b => ({r: b.r, c: b.c})));
              else if (matchBuffer.length >= 2 && isDish(matchBuffer[0].item)) matches.push(...matchBuffer.map(b => ({r: b.r, c: b.c})));
            }
            for (let c = 0; c < GRID_SIZE; c++) {
              let matchBuffer = [];
              for (let r = 0; r < GRID_SIZE; r++) {
                 const item = currentBoard[r][c];
                 const prev = matchBuffer.length > 0 ? matchBuffer[matchBuffer.length-1].item : null;
                 const isSame = prev && item && prev.type === item.type && (prev.category === 'ingredient' ? prev.tier === item.tier : true);
                 
                 if (isSame) matchBuffer.push({r, c, item});
                 else {
                    if (matchBuffer.length >= 3) matches.push(...matchBuffer.map(b => ({r: b.r, c: b.c})));
                    else if (matchBuffer.length >= 2 && isDish(matchBuffer[0].item)) matches.push(...matchBuffer.map(b => ({r: b.r, c: b.c})));
                    matchBuffer = item ? [{r, c, item}] : [];
                 }
              }
              if (matchBuffer.length >= 3) matches.push(...matchBuffer.map(b => ({r: b.r, c: b.c})));
              else if (matchBuffer.length >= 2 && isDish(matchBuffer[0].item)) matches.push(...matchBuffer.map(b => ({r: b.r, c: b.c})));
            }
            
            return Array.from(new Set(matches.map(m => `${m.r},${m.c}`))).map(s => {
                const [r, c] = s.split(',').map(Number);
                return { r, c };
            });
          }, []);

          const shuffleBoard = async (currentBoard) => {
            setIsProcessing(true);
            addLog("SHUFFLE", "action");
            
            let allItems = [];
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (currentBoard[r][c]) {
                        const { prevR, prevC, ...cleanItem } = currentBoard[r][c];
                        allItems.push({ ...cleanItem, isNew: false, isMatch: false, isMerging: false });
                    }
                }
            }

            for (let i = allItems.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [allItems[i], allItems[j]] = [allItems[j], allItems[i]];
            }

            const newBoard = currentBoard.map(row => row.map(() => null));
            let itemIdx = 0;
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (LEVEL_LAYOUT[r][c] === 1 && itemIdx < allItems.length) {
                        newBoard[r][c] = allItems[itemIdx++];
                        newBoard[r][c].isNew = true;
                    }
                }
            }

            setBoard(newBoard);
            await new Promise(r => setTimeout(r, 600));

            const matches = checkForMatches(newBoard);
            if (matches.length > 0) await processMatches(matches, null, newBoard);
            else checkPossibleMoves(newBoard);
            
            setIsProcessing(false);
          };

          const checkPossibleMoves = (currentBoard) => {
            let possibleMoves = [];
            const simBoard = currentBoard.map(row => row.map(item => item ? {...item} : null));

            const trySwap = (r, c, dr, dc) => {
              if (r+dr >= GRID_SIZE || c+dc >= GRID_SIZE) return false;
              if (LEVEL_LAYOUT[r][c] === 0 || LEVEL_LAYOUT[r+dr][c+dc] === 0) return false;
              const temp = simBoard[r][c];
              simBoard[r][c] = simBoard[r+dr][c+dc];
              simBoard[r+dr][c+dc] = temp;
              const hasMatch = checkForMatches(simBoard).length > 0;
              simBoard[r+dr][c+dc] = simBoard[r][c];
              simBoard[r][c] = temp;
              return hasMatch;
            };

            for (let r = 0; r < GRID_SIZE; r++) {
              for (let c = 0; c < GRID_SIZE; c++) {
                if (trySwap(r, c, 1, 0)) possibleMoves.push({r, c});
                if (trySwap(r, c, 0, 1)) possibleMoves.push({r, c});
              }
            }
            
            if (possibleMoves.length === 0) {
              triggerFX(3, 3, "No Moves!", "🚫");
              setTimeout(() => {
                  triggerFX(3, 3, "Shuffle!", "🔀");
                  shuffleBoard(currentBoard);
              }, 1500);
            } else {
              if (hintTimeoutRef.current) clearTimeout(hintTimeoutRef.current);
              hintTimeoutRef.current = setTimeout(() => {
                   const randomMove = possibleMoves[Math.floor(Math.random() * possibleMoves.length)];
                   setHint(randomMove);
              }, 3000); 
            }
          };

          const executeZap = async (targetItem, boardState) => {
             if (moves <= 0) return;
             setIsProcessing(true);
             setElectricityBuff(false); 
             setGuideMessage(null);
             setMoves(prev => prev - 1);
             triggerFX(3, 3, "Zap!", "⚡");

             const nextBoard = boardState.map(row => row.map(item => {
                 if (!item) return null;
                 if (item.type === targetItem.type && item.tier === targetItem.tier) return null; 
                 return item;
             }));
             
             setBoard(nextBoard);
             await new Promise(r => setTimeout(r, 400));
             await applyGravity(nextBoard);
             setIsProcessing(false);
          };

          const processMatches = async (matches, triggerCell = null, currentBoardState = null) => {
            if (matches.length === 0) return false;
            setIsProcessing(true);
            setHint(null); 
            if (hintTimeoutRef.current) clearTimeout(hintTimeoutRef.current);
            
            const sourceBoard = currentBoardState || board;
            const tempBoard = sourceBoard.map(row => row.map(item => item ? {...item} : null));
            const target = triggerCell || matches[0];
            const targetItem = tempBoard[target.r][target.c];
            
            if (!targetItem) { setIsProcessing(false); return false; }
            const config = ITEMS[targetItem.type];
            const isIngredient = config.category === 'ingredient';
            
            if (matches.length >= 5) triggerFX(target.r, target.c, "Superb!", "✨");
            else if (matches.length >= 4) triggerFX(target.r, target.c, "Cool!", "😎");

            matches.forEach(({r,c}) => {
               if (tempBoard[r][c]) tempBoard[r][c].isMatch = true;
            });

            if (isIngredient && targetItem.tier < 2) {
               tempBoard[target.r][target.c].isMatch = false;
               tempBoard[target.r][target.c].isMerging = true;
            }

            setBoard(tempBoard);
            await new Promise(r => setTimeout(r, GAME_SPEED));

            const nextBoard = tempBoard.map(row => row.map(item => item ? {...item} : null));
            let earnedScore = 0;
            const currentMult = multiplier.charges > 0 ? multiplier.val : 1;

            if (targetItem.type === 'cash') {
               const count = matches.length;
               const newMult = count >= 5 ? 2.0 : count >= 4 ? 1.5 : 1.2;
               setMultiplier({ val: newMult, charges: count });
               earnedScore += 100 * count;
               triggerFX(target.r, target.c, `${newMult}x Bonus`, "💵");
            }
            if (targetItem.type === 'fire') { 
                setFireBuff(true); 
                setGuideMessage("Next merge creates a Dish instantly!");
                triggerFX(target.r, target.c, "Fire!", "🔥"); 
            }
            if (targetItem.type === 'water') { 
                setWaterBuff(true); 
                setGuideMessage("Tap ANY two blocks to swap them!");
                triggerFX(target.r, target.c, "Flow!", "💧"); 
            }
            if (targetItem.type === 'electricity') { 
                setElectricityBuff(true); 
                setGuideMessage("Tap an item to destroy all of its kind!");
                triggerFX(target.r, target.c, "Charged!", "⚡"); 
            }

            let itemsToSpawn = 1;
            if (matches.length === 4) itemsToSpawn = 2;
            if (matches.length >= 5) itemsToSpawn = 3;

            let spawnLocations = [target];
            if (itemsToSpawn > 1) {
                const otherMatches = matches.filter(m => !(m.r === target.r && m.c === target.c));
                spawnLocations = [...spawnLocations, ...otherMatches.slice(0, itemsToSpawn - 1)];
            }

            matches.forEach(({r, c}) => {
               const isSurvivor = spawnLocations.some(loc => loc.r === r && loc.c === c);
               if (isIngredient && isSurvivor && targetItem.tier < 2) {
                  let upgradeAmount = 1;
                  if (fireBuff) { upgradeAmount = 2; }
                  let newTier = Math.min(2, targetItem.tier + upgradeAmount);
                  nextBoard[r][c] = { ...targetItem, tier: newTier, isMatch: false, isMerging: false, isNew: true, id: Math.random().toString() };
                  earnedScore += 50 * currentMult;
               } else {
                  nextBoard[r][c] = null;
                  earnedScore += 20 * currentMult;
               }
            });

            if (fireBuff && isIngredient) { 
                setFireBuff(false); 
                setGuideMessage(null);
            }

            if (isIngredient && targetItem.tier === 2) {
               const dish = { ...targetItem, servedId: Date.now() };
               if (matches.length >= 2) {
                 earnedScore += 500 * currentMult * 1.5 * matches.length; 
                 triggerFX(target.r, target.c, "Combo!", "🍽️");
               } else {
                 earnedScore += 500 * currentMult;
                 triggerFX(target.r, target.c, "Served!", "🍽️");
               }
               
               setDishesServed(prev => {
                 const existingIdx = prev.findIndex(d => d.type === dish.type);
                 if (existingIdx >= 0) {
                   const newArr = [...prev];
                   newArr[existingIdx] = { ...newArr[existingIdx], count: (newArr[existingIdx].count || 1) + 1 };
                   return newArr;
                 }
                 return [...prev, { ...dish, count: 1 }];
               });
               if (multiplier.charges > 0) setMultiplier(prev => ({ ...prev, charges: prev.charges - 1 }));
            }

            setScore(prev => prev + Math.floor(earnedScore));
            setBoard(nextBoard); 

            await new Promise(r => setTimeout(r, 150));
            await applyGravity(nextBoard);
            setIsProcessing(false);
            return true;
          };

          const applyGravity = async (prevBoardState) => {
            const currentBoard = prevBoardState.map(row => row.map(item => item ? {...item} : null));
            let moved = false;
            for (let c = 0; c < GRID_SIZE; c++) {
              let emptyCount = 0;
              for (let r = GRID_SIZE - 1; r >= 0; r--) {
                if (LEVEL_LAYOUT[r][c] === 0) continue; 
                if (!currentBoard[r][c]) {
                  emptyCount++;
                } else {
                  if (emptyCount > 0) {
                    currentBoard[r + emptyCount][c] = { ...currentBoard[r][c], isNew: false, prevR: r, prevC: c };
                    currentBoard[r][c] = null;
                    moved = true;
                  } 
                }
              }
            }
            
            if (moved) {
                setBoard(currentBoard); 
                await new Promise(r => setTimeout(r, 600)); 
            }

            const cleanBoard = currentBoard.map(row => row.map(item => {
                if (!item) return null;
                const { prevR, prevC, ...rest } = item;
                return rest;
            }));

            let refilled = false;
            for (let c = 0; c < GRID_SIZE; c++) {
              for (let r = 0; r < GRID_SIZE; r++) {
                 if (LEVEL_LAYOUT[r][c] === 1 && !cleanBoard[r][c]) {
                    cleanBoard[r][c] = createNewItem();
                    refilled = true;
                 }
              }
            }
            
            if (refilled) {
               const finalBoard = cleanBoard.map(row => row.map(item => item ? {...item} : null));
               setBoard(finalBoard);
               const newMatches = checkForMatches(finalBoard);
               if (newMatches.length > 0) {
                  await new Promise(r => setTimeout(r, GAME_SPEED / 2));
                  await processMatches(newMatches, null, finalBoard); 
               } else {
                  checkPossibleMoves(finalBoard);
               }
            } else if (moved) {
               setBoard(cleanBoard); 
               checkPossibleMoves(cleanBoard);
            }
          };

          const handlePointerDown = (e, r, c) => {
             if (isProcessing || gameState !== 'playing') return;
             if (LEVEL_LAYOUT[r][c] === 0) return;
             if (hintTimeoutRef.current) clearTimeout(hintTimeoutRef.current);
             setHint(null);

             if (electricityBuff) {
                 const item = board[r][c];
                 if (item) executeZap(item, board);
                 return; 
             }
             
             dragStartRef.current = { x: e.clientX, y: e.clientY, r, c, isDrag: false };
             if (!selected) setSelected({ r, c });
             else if (selected.r === r && selected.c === c) setSelected(null); 
             else attemptSwap(selected, { r, c });
          };

          const handlePointerMove = (e) => {
             if (waterBuff || electricityBuff) return;
             if (!dragStartRef.current || isProcessing) return;
             const start = dragStartRef.current;
             const dx = e.clientX - start.x;
             const dy = e.clientY - start.y;
             const threshold = 30;
             if (Math.abs(dx) > threshold || Math.abs(dy) > threshold) {
                start.isDrag = true; 
                let targetR = start.r;
                let targetC = start.c;
                if (Math.abs(dx) > Math.abs(dy)) targetC += dx > 0 ? 1 : -1;
                else targetR += dy > 0 ? 1 : -1;
                if (targetR >= 0 && targetR < GRID_SIZE && targetC >= 0 && targetC < GRID_SIZE) {
                   attemptSwap({ r: start.r, c: start.c }, { r: targetR, c: targetC });
                   dragStartRef.current = null; 
                }
             }
          };

          const handlePointerUp = () => { 
             if (dragStartRef.current && !dragStartRef.current.isDrag) {
                 const { r, c } = dragStartRef.current;
                 const item = board[r][c];
                 if (item && item.category === 'ingredient' && item.tier === 2 && !electricityBuff) {
                     processMatches([{r, c}]); 
                     setSelected(null); 
                 }
             }
             dragStartRef.current = null; 
          };

          const attemptSwap = async (pos1, pos2) => {
            if (LEVEL_LAYOUT[pos2.r][pos2.c] === 0) return;
            const dist = Math.abs(pos1.r - pos2.r) + Math.abs(pos1.c - pos2.c);
            const isValidMove = waterBuff ? dist > 0 : dist === 1;
            if (!isValidMove) { setSelected(pos2); return; }

            const newBoard = board.map(row => [...row]);
            const t1 = newBoard[pos1.r][pos1.c];
            const t2 = newBoard[pos2.r][pos2.c];
            newBoard[pos1.r][pos1.c] = t2;
            newBoard[pos2.r][pos2.c] = t1;
            
            setBoard(newBoard); 
            setSelected(null);
            if (waterBuff) { 
                setWaterBuff(false); 
                setGuideMessage(null);
            }

            const matches = checkForMatches(newBoard);
            if (matches.length > 0) {
               setMoves(prev => prev - 1);
               await processMatches(matches, pos2, newBoard);
            } else {
               setTimeout(() => setBoard(board), 200); 
            }
          };

          useEffect(() => {
            if (!isProcessing && gameState === 'playing') {
              if (score >= TARGET_SCORE) setGameState('won');
              else if (moves <= 0) setGameState('lost');
            }
          }, [score, moves, isProcessing, gameState]);

          const handleStartGame = () => {
            setGameState('playing');
            setShowHowTo(true);
          };

          const activeBuffs = [];
          if (fireBuff) activeBuffs.push('fire');
          if (waterBuff) activeBuffs.push('water');
          if (electricityBuff) activeBuffs.push('electricity');
          if (multiplier.charges > 0) activeBuffs.push('cash');

          return (
            <div className="min-h-screen bg-orange-50 flex flex-col font-sans select-none overflow-hidden touch-none"
              onPointerMove={handlePointerMove} onPointerUp={handlePointerUp}>
              
              {gameState === 'welcome' && (
                <WelcomeScreen 
                  onStart={handleStartGame} 
                  onShowGuide={() => setShowHowTo(true)}
                  onShowRecipes={() => setShowIngredients(true)}
                />
              )}
              
              {showHowTo && <HowToModal onClose={() => setShowHowTo(false)} />}
              {showIngredients && <IngredientsModal onClose={() => setShowIngredients(false)} />}
              <DebugConsole logs={logs} visible={showDebug} onToggle={() => setShowDebug(!showDebug)} />
              
              <GuideBanner message={guideMessage} />

              {gameState !== 'playing' && gameState !== 'welcome' && (
                <div className="fixed inset-0 z-[200] bg-black/60 backdrop-blur-md flex items-center justify-center">
                   <div className="bg-white/90 p-8 rounded-[3rem] shadow-2xl flex flex-col items-center animate-pop-in border-8 border-white">
                      <div className="text-8xl mb-4 filter drop-shadow-lg">{gameState === 'won' ? '🎉' : '😓'}</div>
                      <h2 className="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-600 mb-2">{gameState === 'won' ? 'We did it!' : 'Out of Moves!'}</h2>
                      <p className="text-gray-500 font-bold mb-8 text-xl">Final Score: {score.toLocaleString()}</p>
                      <button onClick={() => window.location.reload()} className="bg-gradient-to-r from-pink-500 to-rose-500 hover:from-pink-600 hover:to-rose-600 text-white font-bold py-4 px-10 rounded-full shadow-xl transition-transform hover:scale-105 active:scale-95 text-lg">
                         Play Again
                      </button>
                   </div>
                </div>
              )}

              {activeFX.map(fx => <FloatingFX key={fx.id} fx={fx} />)}

              {/* Top Bar */}
              <div className="relative bg-white/40 backdrop-blur-xl p-4 shadow-sm z-50 flex justify-between items-center border-b border-orange-100">
                <div className="flex items-center gap-3">
                   <div className="flex flex-col items-center leading-none">
                     <div className="text-orange-400 mb-1"><Icon name="PawPrint" size={28} fill="currentColor" /></div>
                     <span className="text-[12px] font-black text-gray-500 uppercase tracking-widest">Purrfect</span>
                     <span className="text-lg font-black text-gray-800">CHEF</span>
                   </div>
                   
                   <div className="flex gap-2">
                     <button onClick={() => setShowHowTo(true)} className="flex flex-col items-center p-2 bg-orange-100 border border-orange-200 rounded-xl shadow-sm hover:bg-white text-orange-600 transform transition-transform hover:scale-105 active:scale-95">
                       <Icon name="HelpCircle" size={20} />
                       <span className="text-[10px] font-bold uppercase mt-0.5">Guide</span>
                     </button>
                     <button onClick={() => setShowIngredients(true)} className="flex flex-col items-center p-2 bg-blue-100 border border-blue-200 rounded-xl shadow-sm hover:bg-white text-blue-600 transform transition-transform hover:scale-105 active:scale-95">
                       <Icon name="BookOpen" size={20} />
                       <span className="text-[10px] font-bold uppercase mt-0.5">Recipes</span>
                     </button>
                   </div>

                   <div className="h-10 w-0.5 bg-gray-300 mx-1"></div>

                   <div className={`flex flex-col items-center bg-pink-500 text-white px-5 py-2 rounded-2xl border-2 shadow-sm ${moves <= 5 ? 'border-red-400 animate-pulse' : 'border-white'}`}>
                      <span className="text-[12px] font-black opacity-80 uppercase tracking-wider">Moves</span>
                      <span className="text-2xl font-black leading-none">{moves}</span>
                   </div>
                </div>

                <div className="absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2 z-[100]">
                   <BuffDisplay activeBuffs={activeBuffs} />
                </div>

                <div className="flex flex-col justify-center items-center bg-yellow-100 px-4 py-1.5 rounded-2xl shadow-md border-2 border-yellow-400 relative overflow-hidden min-w-[100px]">
                  <div className="flex items-center gap-1.5 z-10">
                     <Icon name="Trophy" size={16} className="text-yellow-600 fill-yellow-600" />
                     <span className="font-black text-yellow-800 text-lg leading-none">{score.toLocaleString()}</span>
                  </div>
                  <div className="z-10 text-[9px] font-bold text-yellow-700 uppercase tracking-wide">Goal: {TARGET_SCORE.toLocaleString()}</div>
                  <div className="absolute bottom-0 left-0 h-1.5 w-full bg-white/50">
                     <div className="h-full bg-yellow-500 transition-all duration-1000" style={{ width: `${Math.min(100, (score/TARGET_SCORE)*100)}%` }}></div>
                  </div>
                </div>
              </div>

              <div className="flex-1 flex flex-col items-center justify-center relative">
                <div className="absolute top-10 left-10 text-6xl opacity-5 animate-pulse">🌸</div>
                <div className="absolute bottom-20 right-10 text-8xl opacity-5 animate-bounce">🥐</div>
                <div className="absolute top-20 right-20 text-5xl opacity-5 animate-pulse delay-700">🍋</div>
                <div className="absolute bottom-40 left-16 text-6xl opacity-5 animate-bounce delay-300">🥬</div>
                
                <div className="relative bg-[#fdf6e3] p-4 rounded-[2.5rem] shadow-2xl border-4 border-[#e6d0a8]">
                  <div className="grid gap-1" style={{ gridTemplateColumns: `repeat(${GRID_SIZE}, minmax(0, 1fr))`, width: '96vw', maxWidth: '600px', height: '96vw', maxHeight: '600px' }}>
                    {board.map((row, r) => row.map((item, c) => (
                         <div key={`${r}-${c}`} className="relative w-full h-full">
                            {LEVEL_LAYOUT[r][c] === 0 ? <div className="w-full h-full bg-black/5 rounded-[1rem] inner-shadow" /> : 
                              <Tile item={item} isSelected={selected?.r === r && selected?.c === c} onPointerDown={(e) => handlePointerDown(e, r, c)} row={r} col={c} isHint={hint?.r === r && hint?.c === c} />
                            }
                         </div>
                    )))}
                  </div>
                </div>
              </div>

              {/* Bottom Tray */}
              <div className="bg-white/60 backdrop-blur-xl shadow-[0_-10px_30px_rgba(0,0,0,0.05)] p-6 pb-10 z-50 border-t border-white/50 rounded-t-[3rem]">
                 <div className="flex justify-between items-end mb-3 px-2">
                    <h3 className="text-sm font-black text-gray-600 uppercase tracking-widest flex items-center gap-2">
                      <Icon name="ChefHat" size={18} /> Completed Dishes
                    </h3>
                    <span className="text-xs font-bold text-gray-400 bg-white px-2 py-1 rounded-lg">{dishesServed.reduce((acc, curr) => acc + (curr.count || 1), 0)} Served</span>
                 </div>
                 <div className="h-24 bg-white/50 rounded-3xl border-2 border-dashed border-gray-300 flex items-center px-4 gap-3 overflow-x-auto hide-scrollbar">
                    {dishesServed.length === 0 && <div className="flex items-center gap-2 text-gray-400 text-sm font-bold w-full justify-center opacity-60 italic"><Icon name="Sparkles" size={16} /><span>Cook something tasty!</span></div>}
                    {dishesServed.map((dish, i) => {
                       const config = ITEMS[dish.type];
                       if (!config) return null; // Safe check
                       const tiers = config.tiers;
                       const assetId = tiers ? tiers[2].assetId : null; 
                       return (
                         <div key={i} className="flex-shrink-0 w-16 h-16 bg-white rounded-2xl shadow-[0_4px_10px_rgba(0,0,0,0.1)] border border-white flex items-center justify-center animate-pop-in relative overflow-visible transform hover:scale-110 transition-transform">
                            <div className="w-[80%] h-[80%] drop-shadow-md">
                                <AssetIcon type={assetId} className="w-full h-full" />
                            </div>
                            {dish.count > 1 && (
                              <div className="absolute -top-2 -right-2 bg-gradient-to-br from-red-400 to-pink-500 text-white text-xs font-black w-6 h-6 rounded-full flex items-center justify-center shadow-lg border-2 border-white z-20">
                                {dish.count}
                              </div>
                            )}
                         </div>
                       )
                    })}
                 </div>
              </div>
            </div>
          );
        }

        // Render the React application to the DOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<GameBoard />);
    </script>
</body>
</html>
